<div class="sidebar">
  <h4 class="text-white">Admin Panel</h4>

  <a routerLink="/users" routerLinkActive="active">Users</a>
  <a routerLink="/admin-tasks" routerLinkActive="active">Task Items</a>

  <hr class="text-white">

  <a (click)="logout()">Logout</a>
</div>

<div class="main-content">

  <div class="topbar">
    <h3>Users Management</h3>
  </div>

  <mat-card class="card-custom">

    <!-- Search -->
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search Users</mat-label>
      <input matInput
             placeholder="Search by username or email"
             [(ngModel)]="searchText"
             (input)="applyFilters()">
    </mat-form-field>

    <!-- Table -->
    <table mat-table [dataSource]="paginatedUsers" class="mat-elevation-z1 user-table">

      <!-- SI NO -->
      <ng-container matColumnDef="index">
        <th mat-header-cell *matHeaderCellDef> SI.No </th>
        <td mat-cell *matCellDef="let user; let i = index">
          {{ (currentPage - 1) * pageSize + i + 1 }}
        </td>
      </ng-container>

      <!-- USERNAME -->
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef> Username </th>
        <td mat-cell *matCellDef="let user"> {{user.username}} </td>
      </ng-container>

      <!-- EMAIL -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let user"> {{user.email}} </td>
      </ng-container>

      <!-- ROLE -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let user">
          <span class="role-badge">{{user.role}}</span>
        </td>
      </ng-container>

      <!-- ACTIONS -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef width="180"> Actions </th>

        <td mat-cell *matCellDef="let user">

          <button mat-raised-button
        class="promote-btn"
        (click)="promoteUser(user.id)">
  Promote
</button>

<button mat-raised-button
        class="delete-btn"
        (click)="deleteUser(user.id)">
  Delete
</button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <!-- Pagination -->
    <div class="pagination-box">

      <button mat-raised-button
        class="pagination-btn"
        (click)="prevPage()"
        [disabled]="currentPage === 1">
  Previous
</button>

<span>Page {{currentPage}} of {{totalPages()}}</span>

<button mat-raised-button
        class="pagination-btn"
        (click)="nextPage()"
        [disabled]="currentPage === totalPages()">
  Next
</button>

    </div>

  </mat-card>

</div>
